name = "kingsland-setup"
main = "src/worker.js"
compatibility_date = "2026-04-10"

routes = [
  { pattern = "kingsland.network/setup.sh", zone_name = "kingsland.network" },
  { pattern = "kingsland.network/", zone_name = "kingsland.network" },
]

# Generate src/setup.sh.b64 before every dev/deploy. See scripts/build.sh
# for the reason (Cloudflare edge WAF blocks raw shell-script uploads).
[build]
command = "bash scripts/build.sh"

# Import src/setup.sh.b64 as a text module inside the worker.
[[rules]]
type = "Text"
globs = ["**/*.b64"]
fallthrough = true
